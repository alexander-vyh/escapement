name: tests

# fxh.2: gate the hook + harness test suites in CI so a red suite cannot land on
# main unnoticed (the assessment found 45/423 red on main with no CI guard).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Deploy hooks to ~/.claude/hooks
        # Most hook test files import from ~/.claude/hooks (the deployed location)
        # and module-skip if it is absent. Without this, CI would silently SKIP
        # ~365 tests and still go green — a meaningless gate. Symlink the repo
        # hooks into place so the suite runs in full against this checkout.
        run: |
          mkdir -p "$HOME/.claude"
          ln -s "$GITHUB_WORKSPACE/claude/hooks" "$HOME/.claude/hooks"
      - name: Run hook + harness + agent-surface test suites
        # -p no:cacheprovider keeps the runner clean; fail on skips that hide
        # collection gaps by reporting the skip count explicitly. `tests` carries
        # the agent-surfaces parity suite (test_agent_surfaces.py).
        run: python -m pytest claude/hooks/tests harness/tests tests -q -rs
      - name: Agent-surfaces drift gate
        # Fail closed if the rendered host surfaces (CLAUDE.md / AGENTS.md /
        # .codex/hooks.json / .agents/**) have drifted from agent-surfaces/manifest.json.
        # Without this, the renderer's --check is fail-open on the highest-traffic
        # files (roundtable 2026-06-13, legalist lens).
        run: python3 tools/render_agent_surfaces.py --check

  gitleaks:
    # Secret-scanning gate. Closes the "cited in prose, absent in the repo" gap:
    # research-findings-persistence.md relied on a gitleaks hook that did not exist.
    # This job proves the control CATCHES a planted secret (the oracle) AND scans
    # full history (the gate) — lint/parse alone would be the inert version.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the scan covers every commit
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Secret-scan oracle (proves planted-secret detection + clean control)
        run: python -m pytest tests/test_gitleaks_control.py -q -rs
      - name: Full-history secret scan (the gate)
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml
