name: tests

# fxh.2: gate the hook + harness test suites in CI so a red suite cannot land on
# main unnoticed (the assessment found 45/423 red on main with no CI guard).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run hook + harness test suites
        run: python -m pytest claude/hooks/tests harness/tests -q
